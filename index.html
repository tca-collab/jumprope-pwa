<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Jump Rope" />
  <meta name="description" content="3-Week Jump Rope Mastery Program" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <title>Jump Rope Mastery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #222;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --muted: #888;
      --faint: #444;
      --w1: #FF6B35;
      --w2: #2EC4B6;
      --w3: #8A2BE2;
      --accent: var(--w1);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }
    #app { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    /* HEADER */
    .header { background: #141414; border-bottom: 1px solid var(--border); padding: calc(12px + var(--safe-top)) 20px 12px; flex-shrink: 0; }
    .header-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 2px; }
    .header-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: #fff; line-height: 1; }
    .header-sub { font-size: 11px; color: var(--muted); font-style: italic; margin-top: 2px; }

    /* WEEK TABS */
    .week-tabs { display: flex; background: #111; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .week-tab { flex: 1; padding: 10px 4px; border: none; cursor: pointer; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; border-bottom: 3px solid transparent; transition: all 0.2s; line-height: 1.4; }
    .week-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: #161616; }
    .week-tab span { display: block; font-size: 9px; opacity: 0.6; margin-top: 1px; }

    /* DAY DOTS */
    .day-dots { display: flex; gap: 8px; padding: 12px 16px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
    .day-dots::-webkit-scrollbar { display: none; }
    .day-dot { min-width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .day-dot.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .day-dot.rest { opacity: 0.5; }
    .day-dot.done { color: #4caf50 !important; font-size: 16px; }

    /* SCROLLABLE CONTENT */
    .content { flex: 1; overflow-y: auto; padding: 0 16px calc(16px + var(--safe-bottom)); scrollbar-width: none; }
    .content::-webkit-scrollbar { display: none; }

    /* DAY CARD */
    .day-card { background: var(--surface); border-radius: 16px; border: 1px solid var(--border); border-top: 3px solid var(--accent); overflow: hidden; margin-bottom: 14px; }
    .day-header { padding: 18px 18px 14px; border-bottom: 1px solid #252525; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .day-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; }
    .day-title { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; color: #fff; line-height: 1.1; }
    .day-focus { font-size: 12px; color: var(--muted); font-style: italic; margin-top: 3px; }
    .day-meta { text-align: right; flex-shrink: 0; }
    .day-duration { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--accent); }
    .day-rest-label { font-family: 'DM Mono', monospace; font-size: 9px; color: #555; margin-top: 3px; }

    /* DRILLS */
    .drills-section { padding: 14px 18px; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; color: #555; text-transform: uppercase; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .drill { background: var(--surface2); border-radius: 10px; padding: 12px 14px; border-left: 3px solid var(--accent); margin-bottom: 8px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background 0.3s; }
    .drill-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .drill-name { font-size: 14px; font-weight: 600; color: #eee; flex: 1; }
    .drill-reps { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); white-space: nowrap; flex-shrink: 0; }
    .drill-tip { font-size: 12px; color: #999; margin-top: 6px; font-style: italic; line-height: 1.5; margin-left: 32px; }

    /* VIDEO LINK */
    .video-section { padding: 0 18px 14px; }
    .video-link { display: flex; align-items: center; gap: 10px; background: #1c1c1c; border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; text-decoration: none; color: var(--text); -webkit-tap-highlight-color: transparent; }
    .video-icon { width: 34px; height: 34px; border-radius: 50%; background: #FF0000; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .video-label-top { font-family: 'DM Mono', monospace; font-size: 9px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
    .video-label-title { font-size: 13px; color: #ddd; margin-top: 2px; line-height: 1.3; }

    /* NOTE */
    .note-section { margin: 0 18px 18px; padding: 12px 14px; background: #111; border-radius: 10px; border-left: 3px solid #333; font-size: 13px; color: #aaa; font-style: italic; line-height: 1.6; }

    /* REST DAY */
    .rest-day { padding: 30px 18px; text-align: center; }
    .rest-emoji { font-size: 44px; margin-bottom: 12px; }
    .rest-text { font-size: 15px; color: var(--muted); font-style: italic; line-height: 1.6; }

    /* GEAR NOTE */
    .gear-card { background: #161616; border-radius: 12px; border: 1px solid #2a2a2a; border-left: 3px solid var(--accent); padding: 14px 16px; margin-bottom: 14px; }
    .gear-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 10px; }
    .gear-item { font-size: 13px; color: #999; line-height: 1.8; }
    .gear-item b { color: #ddd; }

    /* WEEK OVERVIEW */
    .overview-card { background: #161616; border-radius: 12px; border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 14px; }
    .overview-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
    .overview-cell { text-align: center; padding: 7px 2px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; }
    .overview-cell.active { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, transparent); }
    .overview-day { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); }
    .overview-name { font-size: 8px; color: #555; margin-top: 2px; line-height: 1.3; }

    /* INSTALL BANNER */
    .install-banner { position: fixed; bottom: calc(16px + var(--safe-bottom)); left: 50%; transform: translateX(-50%); background: #1e1e1e; border: 1px solid var(--accent); border-radius: 50px; padding: 12px 20px; display: flex; align-items: center; gap: 10px; font-size: 13px; color: #ddd; box-shadow: 0 8px 32px rgba(0,0,0,0.6); z-index: 100; white-space: nowrap; cursor: pointer; animation: slideUp 0.4s ease; }
    .install-banner .close { color: var(--muted); font-size: 18px; line-height: 1; margin-left: 4px; }
    @keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }

    /* DRILL CHECKBOX */
    .drill-checkbox { width: 22px; height: 22px; border-radius: 6px; border: 2px solid; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; transition: all 0.18s cubic-bezier(.34,1.56,.64,1); }
    .drill-checkbox.checked { background: #4caf50; border-color: #4caf50; }
    .drill-checked { opacity: 0.72; }
    .drill-name-done { text-decoration: line-through; color: #666; }

    /* DRILL CHECK BOUNCE */
    @keyframes checkBounce { 0%{transform:scale(1)} 35%{transform:scale(1.5)} 65%{transform:scale(0.88)} 85%{transform:scale(1.12)} 100%{transform:scale(1)} }
    .check-bounce { animation: checkBounce 0.42s cubic-bezier(.36,.07,.19,.97); }

    /* DRILL ROW FLASH */
    @keyframes rowFlash { 0%{background:var(--surface2)} 35%{background:#0d2b14} 100%{background:var(--surface2)} }
    .row-flash { animation: rowFlash 0.55s ease forwards; }

    /* PARTICLE CANVAS */
    #particleCanvas { position:fixed; inset:0; pointer-events:none; z-index:999; width:100%; height:100%; }

    /* DAY COMPLETE BADGE */
    #dayBadge { position:fixed; inset:0; z-index:998; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .badge-box { background:linear-gradient(135deg,#0d2b14,#071408); border:2px solid #4caf50; border-radius:22px; padding:30px 44px; text-align:center; box-shadow:0 0 80px rgba(76,175,80,0.4),0 24px 64px rgba(0,0,0,0.9); animation:badgeIn 0.5s cubic-bezier(.34,1.56,.64,1) forwards; }
    @keyframes badgeIn { from{transform:scale(0.3) translateY(50px);opacity:0} to{transform:scale(1) translateY(0);opacity:1} }
    @keyframes badgeOut { from{transform:scale(1);opacity:1} to{transform:scale(0.75) translateY(-30px);opacity:0} }
    .badge-emoji { font-size:56px; line-height:1; margin-bottom:12px; display:block; animation:emojiSpin 0.6s ease; }
    @keyframes emojiSpin { from{transform:rotate(-25deg) scale(0.4)} to{transform:rotate(0) scale(1)} }
    .badge-title { font-family:'Bebas Neue',sans-serif; font-size:40px; letter-spacing:4px; color:#4caf50; line-height:1; }
    .badge-sub { font-size:13px; color:#aaa; margin-top:8px; font-style:italic; }

    /* DAY COMPLETE STATE */
    .day-complete { border-top-color:#4caf50 !important; }
    .overview-done .overview-day { color:#4caf50 !important; }

    .hidden { display:none !important; }
  </style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-label">3-Week Program</div>
    <div class="header-title">Jump Rope Mastery</div>
    <div class="header-sub">From zero to fluid — built for athletes</div>
  </div>
  <div class="week-tabs" id="weekTabs"></div>
  <div class="day-dots" id="dayDots"></div>
  <div class="content" id="content"></div>
</div>

<canvas id="particleCanvas"></canvas>
<div id="dayBadge" class="hidden"></div>

<div class="install-banner hidden" id="installBanner">
  <span>📲</span><span>Add to Home Screen</span>
  <span class="close" id="installClose">×</span>
</div>

<script src="app.js"></script>
</body>
</html>
